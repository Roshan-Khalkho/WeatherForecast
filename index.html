<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🌤 Weather App</h1>

    <input
        type="text"
        id="cityInput"
        placeholder="Enter City Name">

    <button id="searchBtn">
        Search
    </button>

    <div id="result">

        <h2 id="city"></h2>

        <p id="temperature"></p>

        <p id="wind"></p>

        <p id="weather"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
